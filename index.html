<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form for NIApoliton</title>
    <meta name="Author" content="NIApoliton">
    <meta name="description" content="Form for NIApoliton that will redirect the user to the main site of NIApoliton">
    <meta name="keywords" content="NIApoliton, form, redirect, main site">
    <meta http-equiv="refresh" content="150">

    <link rel="icon" type="image/png" href="favicon-NIApoliton.png">
    <link rel="stylesheet" href="z_Form_Niapoliton_CSS.css">

</head>
<body>




<div class="CON">


    

    <form action="../Demo_site/b_Niapoliton_Site.html" target="_blank" class="textbox">

                <!-- Beat A: Centered Brand Name -->
                <div id="beat-a"
                    class="absolute inset-0 flex flex-col items-center justify-center text-center opacity-0 transform translate-y-5 transition-transform duration-75 active">
                    <h1
                        class="text-9xl md:text-[8rem] lg:text-[10rem] font-bold leading-none tracking-tighter mb-8 font-['Outfit'] select-none">
                        <span class="glitch-text brand-neon flex flex-wrap justify-center" data-text="NIApoliton">
                            <span class="shatter-letter">NIApoliton</span>

                        </span>

                </div>
        
    

    <input id="fname" title="Enter the First name" placeholder="First Name" type="text">

    <label for="fname"></label>


    
    <input id="lname"  placeholder="Last Name"  title="Enter the Last name" type="text">

    <label for="lname"></label>


    <input id="submit" placeholder="Submit"  title="Press submit to view NIApoliton" type="submit">


</form>

</div>


    <script src="a_Form_Niapoliton.js"></script>


</body>
</html>
